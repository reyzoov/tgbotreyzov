<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Minion Clicker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="stats">
                <div class="stat">
                    <span class="stat-label">🍌</span>
                    <span id="totalClicks" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">⭐️</span>
                    <span id="level" class="stat-value">1</span>
                </div>
                <div class="stat">
                    <span class="stat-label">⚡️</span>
                    <span id="energy" class="stat-value">100</span>
                    <span>/</span>
                    <span id="energyMax">100</span>
                </div>
            </div>
            <div class="exp-bar">
                <div id="expFill" class="exp-fill"></div>
                <span id="expText" class="exp-text">0/100</span>
            </div>
        </div>

        <div class="click-area">
            <div id="minion" class="minion">
                <div class="minion-face">🐵</div>
                <div class="minion-goggle">👓</div>
            </div>
            <div id="clickPower" class="click-power">💪 x1</div>
        </div>

        <div class="upgrades">
            <h3>Улучшения 🛠</h3>
            <div class="upgrade-list">
                <div class="upgrade-item" data-upgrade="click_power">
                    <div class="upgrade-icon">💪</div>
                    <div class="upgrade-info">
                        <div class="upgrade-name">Сила клика</div>
                        <div class="upgrade-desc">+1 банан за клик</div>
                    </div>
                    <div class="upgrade-cost" id="cost_click_power">100</div>
                    <div class="upgrade-level" id="level_click_power">Ур.0</div>
                </div>
                <div class="upgrade-item" data-upgrade="energy_max">
                    <div class="upgrade-icon">⚡️</div>
                    <div class="upgrade-info">
                        <div class="upgrade-name">Макс. энергия</div>
                        <div class="upgrade-desc">+10 к энергии</div>
                    </div>
                    <div class="upgrade-cost" id="cost_energy_max">100</div>
                    <div class="upgrade-level" id="level_energy_max">Ур.0</div>
                </div>
            </div>
        </div>

        <div class="prestige-info">
            <div class="prestige-badge">🔄 Перерождений: <span id="prestigeCount">0</span></div>
            <div class="prestige-bonus">✨ Бонус: +<span id="prestigeBonus">0</span>%</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
