<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Minion Clicker 🍌</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="stats">
                <div class="stat">
                    <span class="stat-label">🍌</span>
                    <span id="totalBananas" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">⭐️</span>
                    <span id="level" class="stat-value">100</span>
                </div>
                <div class="stat">
                    <span class="stat-label">⚡️</span>
                    <span id="energy" class="stat-value">100000000</span>
                    <span>/</span>
                    <span id="energyMax" class="stat-value">10000000000</span>
                </div>
            </div>
            
            <div class="exp-bar">
                <div id="expFill" class="exp-fill"></div>
                <div id="expText" class="exp-text">0/100</div>
            </div>
        </div>
        
        <!-- Click Area - Minion -->
        <div class="click-area">
            <div id="minion" class="minion">
                <div class="minion-face">🍌</div>
                <div class="minion-eyes">👀</div>
                <div class="minion-goggle">😎</div>
            </div>
            <div id="clickPower" class="click-power">💪 x10000</div>
        </div>
        
        <!-- Upgrades -->
        <div class="upgrades">
            <h3>🛠 УЛУЧШЕНИЯ МИНЬОНА</h3>
            <div class="upgrade-list">
                <div class="upgrade-item" data-upgrade="click_power">
                    <div class="upgrade-icon">💪🍌</div>
                    <div class="upgrade-info">
                        <div class="upgrade-name">Сила клика</div>
                        <div class="upgrade-desc">+1 банан за клик</div>
                    </div>
                    <div class="upgrade-cost">
                        <span id="cost_click_power">100</span>
                    </div>
                    <div id="level_click_power" class="upgrade-level">Ур.0</div>
                </div>
                
                <div class="upgrade-item" data-upgrade="energy_max">
                    <div class="upgrade-icon">🔋⚡️</div>
                    <div class="upgrade-info">
                        <div class="upgrade-name">Макс. энергия</div>
                        <div class="upgrade-desc">+10 к энергии</div>
                    </div>
                    <div class="upgrade-cost">
                        <span id="cost_energy_max">100</span>
                    </div>
                    <div id="level_energy_max" class="upgrade-level">Ур.0</div>
                </div>
            </div>
        </div>
        
        <!-- Prestige Section -->
        <div class="prestige-section">
            <div class="prestige-info">
                <div class="prestige-badge">
                    🔄 Перерождений: <span id="prestigeCount">0</span>
                </div>
                <div class="prestige-bonus">
                    ✨ Бонус: +<span id="prestigeBonus">0</span>%
                </div>
            </div>
            <button id="prestigeBtn" class="prestige-button">🌟 ПЕРЕРОДИТЬСЯ</button>
            <div class="prestige-requirement">Требуется: 5 уровень и 1000 бананов</div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
